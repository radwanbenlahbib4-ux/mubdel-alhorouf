<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔄 مبدل الحروف</title>
<style>
  /* Body & Layout */
  body {
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: #fff;
    font-family: 'Arial', sans-serif;
    margin: 0;
    padding: 30px 15px;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }

  h2 {
    font-size: 2em;
    margin-bottom: 20px;
    color: #00ff88;
    text-shadow: 0 0 10px #00ff88;
  }

  /* Textarea */
  textarea {
    width: 100%;
    max-width: 500px;
    height: 120px;
    font-size: 18px;
    padding: 10px;
    border-radius: 12px;
    border: none;
    outline: none;
    resize: none;
  }

  /* Buttons */
  .buttons {
    margin-top: 15px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
  }

  button {
    background: #00ff88;
    color: #111;
    border: none;
    padding: 12px 25px;
    font-size: 18px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  button:hover {
    background: #00cc66;
    transform: translateY(-2px);
  }

  /* Output */
  #output {
    margin-top: 25px;
    font-size: 22px;
    color: #00ff88;
    word-wrap: break-word;
    max-width: 500px;
    padding: 15px;
    border-radius: 12px;
    background: rgba(0,255,136,0.1);
    min-height: 50px;
    transition: all 0.3s ease;
  }

  /* Responsive for iPhones */
  @media (max-width: 600px){
    h2 { font-size: 1.6em; }
    button { font-size: 16px; padding: 10px 20px; }
    textarea { font-size: 16px; height: 100px; }
    #output { font-size: 20px; }
  }
</style>
</head>
<body>

<h2>🔄 مبدل الحروف</h2>

<textarea id="input" placeholder="اكتب النص هنا..."></textarea>

<div class="buttons">
  <button onclick="convert()">تحويل</button>
  <button onclick="copyResult()">نسخ النتيجة</button>
</div>

<div id="output"></div>

<script>
function convert(){
    let text = document.getElementById("input").value;

    // خريطة الحروف والأرقام (دعم الأحرف الكبيرة)
    let map = {
        "e":"1", "E":"1", "1":"e",
        "c":"3", "C":"3", "3":"c",
        "a":"5", "A":"5", "5":"a",
        "6":"9", "9":"6",
        "8":"7", "7":"8",
        "f":"0", "F":"0", "0":"f",
        "b":"4", "B":"4", "4":"b",
        "d":"2", "D":"2", "2":"d"
    };

    let result = "";
    let i = 0;
    while(i < text.length){
        // استبدال fh_ مباشرة بدون تحويل داخله
        if(text.substr(i,3).toLowerCase() === "fh_"){
            result += "wlan";
            i += 3;
            continue;
        }

        let char = text[i];

        // تجاهل الشرطات السفلية
        if(char === "_"){
            i++;
            continue;
        }

        result += map[char] || char;
        i++;
    }

    const output = document.getElementById("output");
    output.innerText = result;

    // لمسة بصرية
    output.style.background = "rgba(0,255,136,0.3)";
    setTimeout(() => { output.style.background = "rgba(0,255,136,0.1)"; }, 300);
}

function copyResult(){
    const text = document.getElementById("output").innerText;
    if(!text) return;

    navigator.clipboard.writeText(text).then(() => {
        const output = document.getElementById("output");
        output.style.boxShadow = "0 0 15px #00ff88";
        setTimeout(() => { output.style.boxShadow = "none"; }, 500);
    }).catch(() => {
        alert("المتصفح منع النسخ، اضغط داخل الصفحة أولاً.");
    });
}
</script>

</body>
</html>
